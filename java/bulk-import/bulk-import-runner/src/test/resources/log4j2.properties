# At deploy time the CDK passes these through as JVM system properties via
# the Sleeper instance properties of the same name. The :- defaults below
# apply when the system property is not set (e.g. during unit tests).

appender.console.type = Console
appender.console.name = consoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%d{ABSOLUTE}] [%t] %c{1.} %p %x - %m%n

rootLogger.level = ${sys:sleeper.logging.root.level:-INFO}
rootLogger.appenderRef.console.ref = consoleAppender

logger.sleeper.name = sleeper
logger.sleeper.level = ${sys:sleeper.logging.level:-DEBUG}

logger.metrics.name = sleeper.core.metrics.MetricsLogger
logger.metrics.level = INFO

logger.apache.name = org.apache
logger.apache.level = ${sys:sleeper.logging.apache.level:-INFO}

logger.parquet.name = org.apache.parquet
logger.parquet.level = ${sys:sleeper.logging.parquet.level:-WARN}

logger.aws-v1.name = com.amazonaws
logger.aws-v1.level = ${sys:sleeper.logging.aws.level:-INFO}

logger.aws-v2.name = software.amazon
logger.aws-v2.level = ${sys:sleeper.logging.aws.level:-INFO}
