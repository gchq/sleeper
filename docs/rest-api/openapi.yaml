openapi: 3.0.3
info:
  title: Sleeper REST API
  description: |
    REST API for interacting with a deployed Sleeper instance. Provisioned by the optional
    `RestApiStack` and fronted by an AWS API Gateway v2 HTTP API. All requests must be signed
    with AWS SigV4; callers need the `execute-api:Invoke` permission on the API.

    See [docs/rest-api/README.md](README.md) for deployment, authentication and worked examples.
  version: 0.1.0

servers:
  - url: https://{apiId}.execute-api.{region}.amazonaws.com
    description: >-
      The invoke URL of a deployed Sleeper REST API. The full URL is exposed as the CDK output
      `RestApiUrl` and as the instance property `sleeper.rest.api.url`.
    variables:
      apiId:
        default: abcd1234
        description: The API Gateway HTTP API id (the subdomain in the invoke URL).
      region:
        default: eu-west-2
        description: The AWS region the Sleeper instance is deployed in.

security:
  - sigv4: []

paths:
  /sleeper/tables:
    post:
      summary: Add a table
      description: |
        Creates a new table in the Sleeper instance. Equivalent to running the `addTable.sh`
        script. See [add-table.md](add-table.md) for a worked example.
      operationId: addTable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTableRequest'
            example:
              properties:
                sleeper.table.name: my-table
              schema:
                rowKeyFields:
                  - name: key
                    type: StringType
                sortKeyFields:
                  - name: timestamp
                    type: LongType
                valueFields:
                  - name: value
                    type: StringType
              splitPoints:
                - m
      responses:
        '201':
          description: Table created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddTableResponse'
              example:
                tableId: 01HXYZABCDEFGHJKMNPQRSTVWX
                tableName: my-table
        '400':
          description: |
            Request was rejected before the table was created. Triggered by a body that is not
            valid JSON, an empty body, missing `properties` or `schema`, unparseable split points,
            or property values that fail validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: invalid_request
                message: Request must include 'schema'
        '409':
          description: A table with the requested name already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: table_already_exists
                message: Table with name 'my-table' already exists
        '500':
          description: The request failed unexpectedly. Consult the REST API Lambda log group.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: internal_error
                message: Failed to action event

components:
  securitySchemes:
    sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: >-
        AWS Signature Version 4. Required by the API Gateway v2 IAM authorizer. Callers must
        have an IAM identity with `execute-api:Invoke` on the API. The AWS SDKs and tools such
        as `awscurl` sign requests automatically.
      x-amazon-apigateway-authtype: awsSigv4

  schemas:
    AddTableRequest:
      type: object
      required: [properties, schema]
      properties:
        properties:
          type: object
          description: |
            Table properties as a flat map of string keys to string values. Keys are Sleeper
            table property names (see the [table properties documentation](../usage/property-master.md)).
            The `sleeper.table.name` property is required and determines the name of the new table.
          additionalProperties:
            type: string
          example:
            sleeper.table.name: my-table
        schema:
          type: object
          description: |
            The Sleeper schema for the new table, as JSON. Passed through to `SchemaSerDe` on
            the server, so any shape accepted by the schema template is accepted here. See
            [creating a schema](../usage/schema.md) for the shape and supported field types.
          example:
            rowKeyFields:
              - name: key
                type: StringType
            valueFields:
              - name: value
                type: StringType
        splitPoints:
          type: array
          description: |
            Optional pre-split points for the table's partition tree. Each entry is the string
            representation of a value in the table's single row key column; supplying split
            points for a multi-row-key table is rejected with a 400.
          items:
            type: string
          example:
            - m

    AddTableResponse:
      type: object
      required: [tableId, tableName]
      properties:
        tableId:
          type: string
          description: The unique id assigned to the new table.
        tableName:
          type: string
          description: The name of the new table (echoed from the request).

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: >-
            A short, stable identifier for the error. Known values include `invalid_request`,
            `table_already_exists`, `not_found`, and `internal_error`.
        message:
          type: string
          description: A human-readable description of the failure. May be absent.
